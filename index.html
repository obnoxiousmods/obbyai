<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI · obby.ca</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300..700;1,14..32,300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.5/purify.min.js"></script>
<style>
:root {
  --bg:          #0a0a0a;
  --sidebar-bg:  #101010;
  --surface:     #161616;
  --surface2:    #1e1e1e;
  --border:      #242424;
  --border2:     #2e2e2e;
  --accent:      #7c5cfc;
  --accent-h:    #6644ee;
  --accent-dim:  rgba(124,92,252,.15);
  --accent-glow: rgba(124,92,252,.25);
  --text:        #e4e4e7;
  --text-2:      #a1a1aa;
  --text-3:      #555;
  --user-bg:     #18142e;
  --ai-bg:       #111111;
  --red:         #f87171;
  --green:       #4ade80;
  --yellow:      #fbbf24;
  --radius:      12px;
  --sidebar-w:   268px;
  --header-h:    54px;
  --input-max:   860px;
  --transition:  0.15s ease;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, sans-serif; font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
button { cursor: pointer; font-family: inherit; border: none; background: none; color: inherit; }
input, textarea, select { font-family: inherit; color: inherit; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }
svg { display: block; flex-shrink: 0; }

/* ── Layout ── */
#app { display: flex; height: 100vh; overflow: hidden; }

/* ── Sidebar ── */
#sidebar {
  width: var(--sidebar-w); flex-shrink: 0; background: var(--sidebar-bg);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
  transition: transform var(--transition), width var(--transition);
  z-index: 50;
}
#sidebar.collapsed { width: 0; border-right: none; overflow: hidden; }
.sidebar-head { padding: 12px 10px 8px; display: flex; align-items: center; gap: 6px; }
.logo { flex: 1; font-size: 0.85rem; font-weight: 600; letter-spacing: 0.05em; padding: 0 4px; color: var(--text-2); }
.logo span { color: var(--accent); }
#new-chat-btn {
  display: flex; align-items: center; justify-content: center;
  width: 30px; height: 30px; border-radius: 8px; color: var(--text-2);
  transition: background var(--transition), color var(--transition);
}
#new-chat-btn:hover { background: var(--surface2); color: var(--text); }
.sidebar-search { padding: 0 10px 8px; }
.search-wrap { display: flex; align-items: center; gap: 6px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; }
.search-wrap svg { color: var(--text-3); flex-shrink: 0; }
#search-input { flex: 1; background: none; border: none; outline: none; font-size: 0.82rem; color: var(--text); }
#search-input::placeholder { color: var(--text-3); }
#conv-list { flex: 1; overflow-y: auto; padding: 0 6px 6px; }
.conv-group-label { font-size: 0.7rem; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; padding: 12px 8px 4px; }
.conv-item {
  display: flex; align-items: center; gap-6px; border-radius: 8px;
  padding: 7px 8px; cursor: pointer; gap: 6px;
  transition: background var(--transition); position: relative; group: true;
}
.conv-item:hover { background: var(--surface); }
.conv-item.active { background: var(--accent-dim); }
.conv-title { flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-size: 0.83rem; color: var(--text-2); }
.conv-item.active .conv-title { color: var(--text); }
.conv-actions { display: none; gap: 2px; }
.conv-item:hover .conv-actions, .conv-item.active .conv-actions { display: flex; }
.conv-action-btn { padding: 3px; border-radius: 4px; color: var(--text-3); transition: color var(--transition), background var(--transition); }
.conv-action-btn:hover { color: var(--text); background: var(--border); }
.conv-action-btn.del:hover { color: var(--red); }
.sidebar-foot { padding: 8px 10px; border-top: 1px solid var(--border); }
#settings-btn { display: flex; align-items: center; gap: 8px; width: 100%; padding: 8px; border-radius: 8px; color: var(--text-2); font-size: 0.83rem; transition: background var(--transition), color var(--transition); }
#settings-btn:hover { background: var(--surface2); color: var(--text); }

/* ── Main ── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

/* ── Header ── */
#header {
  height: var(--header-h); flex-shrink: 0; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px; padding: 0 14px;
}
#sidebar-toggle { display: flex; align-items: center; justify-content: center; width: 30px; height: 30px; border-radius: 8px; color: var(--text-2); transition: background var(--transition), color var(--transition); }
#sidebar-toggle:hover { background: var(--surface2); color: var(--text); }
#model-btn {
  display: flex; align-items: center; gap: 6px; padding: 5px 10px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  font-size: 0.82rem; color: var(--text-2); font-weight: 500;
  transition: border-color var(--transition), color var(--transition);
}
#model-btn:hover { border-color: var(--accent); color: var(--text); }
.model-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
#server-btn {
  display: flex; align-items: center; gap: 6px; padding: 5px 10px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  font-size: 0.82rem; color: var(--text-2); font-weight: 500;
  transition: border-color var(--transition), color var(--transition);
}
#server-btn:hover { border-color: var(--accent); color: var(--text); }
.server-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.server-dot.local  { background: #4ade80; }
.server-dot.remote { background: #60a5fa; }
#header-spacer { flex: 1; }
.header-action { display: flex; align-items: center; justify-content: center; width: 30px; height: 30px; border-radius: 8px; color: var(--text-2); transition: background var(--transition), color var(--transition); }
.header-action:hover { background: var(--surface2); color: var(--text); }
#conv-title-display { font-size: 0.82rem; color: var(--text-3); max-width: 200px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

/* ── Messages ── */
#messages-wrap { flex: 1; overflow-y: auto; position: relative; }
#messages { max-width: var(--input-max); margin: 0 auto; padding: 24px 20px 12px; display: flex; flex-direction: column; gap: 6px; }

/* Empty state */
#empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 20px; color: var(--text-2); }
.empty-logo { font-size: 2.5rem; font-weight: 300; letter-spacing: -0.02em; color: var(--text); }
.empty-logo span { color: var(--accent); }
.empty-sub { font-size: 0.9rem; color: var(--text-3); }
.suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 520px; }
.suggestion-btn {
  padding: 8px 14px; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); font-size: 0.82rem; color: var(--text-2);
  transition: border-color var(--transition), color var(--transition), background var(--transition);
  text-align: left; cursor: pointer;
}
.suggestion-btn:hover { border-color: var(--accent); color: var(--text); background: var(--accent-dim); }

/* Message rows */
.msg-row { display: flex; gap: 10px; padding: 4px 0; position: relative; }
.msg-row.user { flex-direction: row-reverse; }
.msg-row + .msg-row.user { margin-top: 8px; }
.msg-row + .msg-row.ai { margin-top: 2px; }

.avatar {
  width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700;
  margin-top: 2px;
}
.msg-row.user .avatar { background: var(--accent); color: #fff; }
.msg-row.ai .avatar { background: var(--surface2); border: 1px solid var(--border); color: var(--accent); }

.msg-col { display: flex; flex-direction: column; gap: 4px; max-width: min(82%, 680px); }
.msg-row.user .msg-col { align-items: flex-end; }

.bubble {
  padding: 10px 14px; border-radius: var(--radius); font-size: 0.88rem; line-height: 1.65;
  word-break: break-word; position: relative;
}
.msg-row.user .bubble { background: var(--user-bg); border: 1px solid rgba(124,92,252,.2); border-radius: var(--radius) 4px var(--radius) var(--radius); }
.msg-row.ai .bubble { background: var(--ai-bg); border: 1px solid var(--border); border-radius: 4px var(--radius) var(--radius) var(--radius); }

/* Bubble markdown */
.bubble p { margin-bottom: 0.5em; }
.bubble p:last-child { margin-bottom: 0; }
.bubble ul, .bubble ol { padding-left: 1.5em; margin: 0.4em 0; }
.bubble li { margin-bottom: 0.2em; }
.bubble h1, .bubble h2, .bubble h3, .bubble h4 { margin: 0.9em 0 0.4em; line-height: 1.3; }
.bubble h1 { font-size: 1.1em; } .bubble h2 { font-size: 1em; } .bubble h3 { font-size: 0.95em; }
.bubble hr { border: none; border-top: 1px solid var(--border); margin: 0.8em 0; }
.bubble blockquote { border-left: 3px solid var(--accent); padding: 4px 12px; color: var(--text-2); margin: 0.6em 0; background: var(--accent-dim); border-radius: 0 6px 6px 0; }
.bubble a { color: var(--accent); text-decoration: none; }
.bubble a:hover { text-decoration: underline; }
.bubble table { width: 100%; border-collapse: collapse; margin: 0.6em 0; font-size: 0.85em; }
.bubble th, .bubble td { border: 1px solid var(--border2); padding: 6px 10px; text-align: left; }
.bubble th { background: var(--surface2); font-weight: 600; }
.bubble tr:nth-child(even) td { background: rgba(255,255,255,.02); }
.bubble p > code, .bubble li > code { background: rgba(124,92,252,.15); border: 1px solid rgba(124,92,252,.2); color: #c4b5fd; padding: 1px 5px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 0.82em; }

/* Code blocks */
.code-block { margin: 0.6em 0; border-radius: 8px; overflow: hidden; border: 1px solid var(--border2); }
.code-header { display: flex; align-items: center; justify-content: space-between; padding: 7px 12px; background: #1a1a1a; border-bottom: 1px solid var(--border2); }
.code-lang { font-size: 0.75rem; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; font-family: 'JetBrains Mono', monospace; }
.copy-code-btn { display: flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 5px; font-size: 0.75rem; color: var(--text-3); background: var(--surface); border: 1px solid var(--border); transition: all var(--transition); }
.copy-code-btn:hover { color: var(--text); border-color: var(--border2); }
.copy-code-btn.copied { color: var(--green); border-color: var(--green); }
.code-block pre { margin: 0; padding: 14px; overflow-x: auto; background: #0d0d0d !important; font-size: 0.82rem; line-height: 1.6; }
.code-block pre code { font-family: 'JetBrains Mono', monospace !important; background: transparent !important; padding: 0 !important; font-size: inherit !important; }

/* Images in messages */
.msg-images { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; justify-content: flex-end; }
.msg-image { max-width: 260px; max-height: 200px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border); cursor: pointer; }
.msg-row.ai .msg-images { justify-content: flex-start; }

/* Message actions */
.msg-actions { display: flex; gap: 2px; opacity: 0; transition: opacity var(--transition); }
.msg-row:hover .msg-actions { opacity: 1; }
.msg-row.user .msg-actions { justify-content: flex-end; }
.msg-action { display: flex; align-items: center; gap: 4px; padding: 4px 7px; border-radius: 6px; font-size: 0.75rem; color: var(--text-3); transition: all var(--transition); }
.msg-action:hover { background: var(--surface2); color: var(--text); }
.msg-action.danger:hover { color: var(--red); }

/* Meta row (timestamp + stats) */
.msg-meta { font-size: 0.7rem; color: var(--text-3); display: flex; gap: 10px; align-items: center; }
.msg-row.user .msg-meta { justify-content: flex-end; }
.stat-badge { display: flex; align-items: center; gap: 4px; }

/* Thinking / streaming cursor */
.thinking-dots { display: inline-flex; gap: 4px; align-items: center; padding: 4px 2px; }
.thinking-dots span { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: bounce 1.2s infinite; }
.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity:0.4; } 30% { transform: translateY(-5px); opacity:1; } }
.stream-cursor::after { content: '▋'; animation: blink .7s step-end infinite; color: var(--accent); font-size: 0.85em; }
@keyframes blink { 50% { opacity: 0; } }

/* Editing */
.editing-bubble { width: 100%; }
.edit-textarea { width: 100%; background: var(--surface); border: 1px solid var(--accent); border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 0.88rem; line-height: 1.65; resize: none; outline: none; min-height: 60px; font-family: inherit; }
.edit-actions { display: flex; gap: 6px; margin-top: 6px; }
.edit-save { background: var(--accent); color: #fff; padding: 5px 14px; border-radius: 7px; font-size: 0.8rem; font-weight: 500; transition: background var(--transition); }
.edit-save:hover { background: var(--accent-h); }
.edit-cancel { color: var(--text-2); padding: 5px 12px; border-radius: 7px; font-size: 0.8rem; border: 1px solid var(--border); transition: background var(--transition); }
.edit-cancel:hover { background: var(--surface2); }

/* Scroll to bottom */
#scroll-btn {
  position: fixed; bottom: 100px; right: 24px; z-index: 20;
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--surface2); border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-2); opacity: 0; pointer-events: none;
  transition: opacity var(--transition), background var(--transition);
  box-shadow: 0 4px 12px rgba(0,0,0,.4);
}
#scroll-btn.visible { opacity: 1; pointer-events: all; }
#scroll-btn:hover { background: var(--border2); color: var(--text); }

/* ── Input area ── */
#input-area { flex-shrink: 0; padding: 10px 20px 16px; border-top: 1px solid var(--border); }
#input-inner { max-width: var(--input-max); margin: 0 auto; display: flex; flex-direction: column; gap: 8px; }

/* Image previews */
#image-previews { display: flex; flex-wrap: wrap; gap: 6px; }
.preview-item { position: relative; }
.preview-img { width: 64px; height: 64px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border2); }
.preview-remove { position: absolute; top: -5px; right: -5px; width: 18px; height: 18px; border-radius: 50%; background: #222; border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; color: var(--text-2); font-size: 0.7rem; transition: color var(--transition), background var(--transition); }
.preview-remove:hover { color: var(--red); background: #2a0000; }

/* System prompt bar */
#sysprompt-bar { display: none; }
#sysprompt-bar.open { display: block; }
#sysprompt-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text-2); font-size: 0.82rem; resize: none; outline: none; font-family: inherit; min-height: 48px; transition: border-color var(--transition); }
#sysprompt-input:focus { border-color: var(--accent); color: var(--text); }
#sysprompt-input::placeholder { color: var(--text-3); }

/* Main input box */
#input-box {
  display: flex; align-items: flex-end; gap: 8px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 10px 10px 10px 14px;
  transition: border-color var(--transition);
}
#input-box:focus-within { border-color: rgba(124,92,252,.5); }
#prompt { flex: 1; background: none; border: none; outline: none; color: var(--text); font-size: 0.9rem; resize: none; max-height: 180px; min-height: 22px; line-height: 1.55; font-family: inherit; }
#prompt::placeholder { color: var(--text-3); }
.input-btns { display: flex; align-items: flex-end; gap: 4px; }
.input-icon-btn { display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 8px; color: var(--text-3); transition: all var(--transition); }
.input-icon-btn:hover { background: var(--surface2); color: var(--text); }
#send-btn {
  display: flex; align-items: center; justify-content: center;
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--accent); color: #fff; flex-shrink: 0;
  transition: background var(--transition), transform var(--transition);
}
#send-btn:hover:not(:disabled) { background: var(--accent-h); transform: scale(1.05); }
#send-btn:disabled { background: var(--border); cursor: not-allowed; }
#stop-btn { display: none; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 8px; background: #3b1a1a; border: 1px solid #6b2a2a; color: var(--red); transition: background var(--transition); }
#stop-btn:hover { background: #4a2020; }
#stop-btn.visible { display: flex; }
#send-btn.hidden { display: none; }

/* Input toolbar */
#input-toolbar { display: flex; align-items: center; gap: 4px; }
.toolbar-btn { display: flex; align-items: center; gap: 5px; padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; color: var(--text-3); transition: all var(--transition); }
.toolbar-btn:hover { background: var(--surface2); color: var(--text-2); }
.toolbar-btn.active { color: var(--accent); background: var(--accent-dim); }
#toolbar-spacer { flex: 1; }
#token-counter { font-size: 0.72rem; color: var(--text-3); }
#regen-btn { display: none; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; color: var(--text-2); border: 1px solid var(--border); transition: all var(--transition); }
#regen-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
#regen-btn.visible { display: flex; }

/* ── Modal base ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity var(--transition); backdrop-filter: blur(4px); }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 16px; padding: 24px; width: min(480px, 94vw); max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.6); transform: scale(.96); transition: transform var(--transition); }
.modal-overlay.open .modal { transform: scale(1); }
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.modal-title { font-size: 1rem; font-weight: 600; }
.modal-close { display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 7px; color: var(--text-2); transition: all var(--transition); }
.modal-close:hover { background: var(--surface2); color: var(--text); }
.form-group { margin-bottom: 18px; }
.form-label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--text-2); margin-bottom: 6px; }
.form-label span { color: var(--text-3); font-weight: 400; margin-left: 6px; }
.form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 0.88rem; outline: none; transition: border-color var(--transition); }
.form-input:focus { border-color: var(--accent); }
.form-select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 0.88rem; outline: none; transition: border-color var(--transition); appearance: none; cursor: pointer; }
.form-select:focus { border-color: var(--accent); }
.form-textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 0.85rem; resize: vertical; outline: none; font-family: inherit; min-height: 80px; transition: border-color var(--transition); }
.form-textarea:focus { border-color: var(--accent); }
.range-wrap { display: flex; align-items: center; gap: 10px; }
input[type=range] { flex: 1; accent-color: var(--accent); height: 4px; }
.range-val { font-size: 0.82rem; color: var(--text-2); min-width: 32px; text-align: right; font-variant-numeric: tabular-nums; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
.btn { padding: 7px 16px; border-radius: 8px; font-size: 0.85rem; font-weight: 500; transition: all var(--transition); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-h); }
.btn-ghost { color: var(--text-2); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--surface2); color: var(--text); }
.section-label { font-size: 0.72rem; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }

/* Model picker */
.model-option { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: pointer; transition: background var(--transition); border: 1px solid transparent; }
.model-option:hover { background: var(--surface2); }
.model-option.selected { border-color: var(--accent); background: var(--accent-dim); }
.model-info { flex: 1; }
.model-name { font-size: 0.85rem; font-weight: 500; }
.model-details { font-size: 0.75rem; color: var(--text-3); margin-top: 2px; }
.model-size { font-size: 0.75rem; color: var(--text-3); }

/* Image lightbox */
#lightbox { position: fixed; inset: 0; background: rgba(0,0,0,.9); z-index: 200; display: none; align-items: center; justify-content: center; cursor: zoom-out; }
#lightbox.open { display: flex; }
#lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; object-fit: contain; }

/* Keyboard shortcuts */
.kbd { display: inline-flex; align-items: center; gap: 3px; }
.key { display: inline-block; background: var(--surface2); border: 1px solid var(--border2); border-radius: 4px; padding: 2px 6px; font-size: 0.72rem; font-family: 'JetBrains Mono', monospace; color: var(--text-2); }
.shortcuts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; }
.shortcut-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.8rem; color: var(--text-2); gap: 8px; }
.shortcut-desc { color: var(--text-3); font-size: 0.78rem; }

/* Context bar */
#ctx-bar { display: flex; align-items: center; gap: 8px; font-size: 0.72rem; color: var(--text-3); padding-top: 4px; }
#ctx-progress { flex: 1; max-width: 120px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
#ctx-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; width: 0%; }
#ctx-fill.warn { background: var(--yellow); }
#ctx-fill.danger { background: var(--red); }

/* Toast */
#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 8px 16px; font-size: 0.82rem; color: var(--text); opacity: 0; pointer-events: none; transition: all 0.2s; z-index: 300; box-shadow: 0 4px 20px rgba(0,0,0,.4); }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Mobile */
@media (max-width: 640px) {
  #sidebar { position: fixed; top: 0; left: 0; bottom: 0; transform: translateX(-100%); }
  #sidebar.mobile-open { transform: translateX(0); }
  #sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 40; display: none; }
  #sidebar-overlay.visible { display: block; }
  #messages { padding: 16px 12px 8px; }
  #input-area { padding: 8px 12px 12px; }
  .bubble { padding: 9px 12px; }
}

/* Animations */
.msg-row { animation: msgIn 0.2s ease; }
@keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
</style>
</head>

<script>
// ═══════════════════════════════════════════
// CONSTANTS & STATE
// ═══════════════════════════════════════════
const STORAGE_KEY = 'aichat_v2';
const DEFAULT_SETTINGS = {
  model: 'llama3.1:8b',
  temperature: 0.7,
  topP: 0.9,
  maxTokens: 2048,
  contextLength: 4096,
  systemPrompt: 'You are a sharp, knowledgeable assistant running locally on a private server. Be accurate and direct — lead with the answer, then explain. If you\'re uncertain, say so. Use markdown: code blocks for code, bullet points for lists, headers for long responses. Keep it focused and avoid filler.',
};
const SUGGESTIONS = [
  'Explain this like I\'m 5: how does HTTPS work?',
  'Write a bash script to find duplicate files by content hash',
  'What\'s the difference between TCP and UDP? When would you use each?',
  'Review my code for bugs and improvements',
  'Write a regex to extract all email addresses from a text',
  'What are the most common Linux performance bottlenecks and how do you diagnose them?',
  'Explain Big O notation with practical examples',
  'Write a Python function to retry a network request with exponential backoff',
  'What\'s the best way to structure a REST API for a TODO app?',
  'Summarize the key trade-offs between SQL and NoSQL databases',
];

let conversations = [];
let currentId = null;
let settings = { ...DEFAULT_SETTINGS };
let generating = false;
let abortCtrl = null;
let pendingImages = [];
let autoScroll = true;
let sidebarOpen = true;
let availableModels = [];
let totalTokensUsed = 0;

// ═══════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════
function loadStorage() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    conversations = d.conversations || [];
    settings = { ...DEFAULT_SETTINGS, ...(d.settings || {}) };
  } catch { conversations = []; settings = { ...DEFAULT_SETTINGS }; }
}
function saveStorage() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ conversations, settings }));
  } catch(e) {
    if (e.name === 'QuotaExceededError') {
      // Trim oldest conversations
      while (conversations.length > 20) conversations.pop();
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ conversations, settings }));
    }
  }
}

// ═══════════════════════════════════════════
// CONVERSATIONS
// ═══════════════════════════════════════════
function currentConv() { return conversations.find(c => c.id === currentId) || null; }

function newConversation() {
  const conv = { id: Date.now().toString(36) + Math.random().toString(36).slice(2), title: 'New Chat', messages: [], created: Date.now(), updated: Date.now() };
  conversations.unshift(conv);
  currentId = conv.id;
  pendingImages = [];
  saveStorage();
  renderSidebar();
  renderMessages();
  document.getElementById('prompt').focus();
  updateRegenBtn();
  updateCtxBar();
}

function selectConv(id) {
  currentId = id;
  pendingImages = [];
  renderSidebar();
  renderMessages();
  updateRegenBtn();
  updateCtxBar();
  closeSidebarMobile();
}

function deleteConv(id, e) {
  e && e.stopPropagation();
  conversations = conversations.filter(c => c.id !== id);
  if (currentId === id) currentId = conversations[0]?.id || null;
  saveStorage();
  renderSidebar();
  renderMessages();
  updateRegenBtn();
}

function startRename(id, e) {
  e && e.stopPropagation();
  const el = document.querySelector(`.conv-item[data-id="${id}"] .conv-title`);
  if (!el) return;
  const old = el.textContent;
  el.contentEditable = 'true';
  el.focus();
  const sel = window.getSelection();
  const range = document.createRange();
  range.selectNodeContents(el);
  sel.removeAllRanges();
  sel.addRange(range);
  const done = () => {
    el.contentEditable = 'false';
    const val = el.textContent.trim();
    const conv = conversations.find(c => c.id === id);
    if (conv) { conv.title = val || old; saveStorage(); renderSidebar(); }
  };
  el.onblur = done;
  el.onkeydown = ev => { if (ev.key === 'Enter') { ev.preventDefault(); el.blur(); } if (ev.key === 'Escape') { el.textContent = old; el.blur(); } };
}

function autoTitle(conv) {
  if (conv.title !== 'New Chat') return;
  const first = conv.messages.find(m => m.role === 'user');
  if (!first) return;
  const text = typeof first.content === 'string' ? first.content : (first.content?.find?.(c => c.type === 'text')?.text || '');
  conv.title = text.slice(0, 42) + (text.length > 42 ? '…' : '');
  saveStorage();
  renderSidebar();
  document.getElementById('conv-title-display').textContent = conv.title;
}

function filterConvs(q) {
  renderSidebar(q.toLowerCase());
}

function groupByDate(convs) {
  const now = Date.now(), day = 86400000;
  const groups = { Today: [], Yesterday: [], 'This Week': [], Older: [] };
  for (const c of convs) {
    const age = now - c.updated;
    if (age < day) groups.Today.push(c);
    else if (age < 2 * day) groups.Yesterday.push(c);
    else if (age < 7 * day) groups['This Week'].push(c);
    else groups.Older.push(c);
  }
  return groups;
}

function renderSidebar(q = '') {
  const list = document.getElementById('conv-list');
  let convs = conversations.filter(c => !q || c.title.toLowerCase().includes(q) || c.messages.some(m => (typeof m.content === 'string' ? m.content : '').toLowerCase().includes(q)));
  const groups = groupByDate(convs);
  list.innerHTML = '';
  for (const [label, items] of Object.entries(groups)) {
    if (!items.length) continue;
    const gl = document.createElement('div');
    gl.className = 'conv-group-label';
    gl.textContent = label;
    list.appendChild(gl);
    for (const c of items) {
      const item = document.createElement('div');
      item.className = 'conv-item' + (c.id === currentId ? ' active' : '');
      item.dataset.id = c.id;
      item.onclick = () => selectConv(c.id);
      item.innerHTML = `
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="color:var(--text-3);flex-shrink:0"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span class="conv-title">${esc(c.title)}</span>
        <div class="conv-actions">
          <button class="conv-action-btn" title="Rename" onclick="startRename('${c.id}',event)">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="conv-action-btn del" title="Delete" onclick="deleteConv('${c.id}',event)">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
          </button>
        </div>`;
      list.appendChild(item);
    }
  }
  if (!convs.length) {
    list.innerHTML = '<div style="padding:20px 12px;color:var(--text-3);font-size:0.82rem;text-align:center">No conversations</div>';
  }
}

// ═══════════════════════════════════════════
// MARKDOWN + HIGHLIGHT
// ═══════════════════════════════════════════
function setupMarked() {
  const renderer = new marked.Renderer();
  renderer.code = (code, lang) => {
    let highlighted, language = 'plaintext', displayLang = lang || 'text';
    try {
      if (lang && hljs.getLanguage(lang)) {
        highlighted = hljs.highlight(code, { language: lang, ignoreIllegals: true }).value;
        language = lang;
      } else {
        highlighted = hljs.highlightAuto(code).value;
      }
    } catch { highlighted = esc(code); }
    return `<div class="code-block"><div class="code-header"><span class="code-lang">${esc(displayLang)}</span><button class="copy-code-btn" onclick="copyCode(this)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy</button></div><pre><code class="hljs language-${esc(language)}">${highlighted}</code></pre></div>`;
  };
  marked.use({ renderer, breaks: true, gfm: true });
}

function renderMd(text) {
  try {
    const raw = marked.parse(text);
    return DOMPurify.sanitize(raw, { ADD_ATTR: ['onclick', 'class'], FORCE_BODY: true });
  } catch { return esc(text); }
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════
// MESSAGES
// ═══════════════════════════════════════════
function renderMessages() {
  const conv = currentConv();
  const wrap = document.getElementById('messages');
  document.getElementById('conv-title-display').textContent = conv?.title || '';

  if (!conv || conv.messages.length === 0) {
    wrap.innerHTML = `<div id="empty-state">
      <div class="empty-logo">ai<span>.</span>obby<span>.ca</span></div>
      <div class="empty-sub">${settings.model}</div>
      <div class="suggestions">${SUGGESTIONS.map(s => `<button class="suggestion-btn" onclick="sendSuggestion(this)">${esc(s)}</button>`).join('')}</div>
    </div>`;
    return;
  }

  wrap.innerHTML = '';
  for (const msg of conv.messages) {
    wrap.appendChild(buildMsgEl(msg, conv));
  }
  if (autoScroll) scrollToBottom(true);
}

function buildMsgEl(msg, conv) {
  const row = document.createElement('div');
  row.className = `msg-row ${msg.role}`;
  row.dataset.msgId = msg.id;

  const isUser = msg.role === 'user';
  const isLast = conv ? conv.messages[conv.messages.length - 1]?.id === msg.id : false;
  const isLastAI = !isUser && isLast;

  // Avatar
  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = isUser ? 'U' : 'G';
  row.appendChild(av);

  // Col
  const col = document.createElement('div');
  col.className = 'msg-col';

  // Images (user)
  if (msg.images?.length) {
    const imgWrap = document.createElement('div');
    imgWrap.className = 'msg-images';
    for (const src of msg.images) {
      const img = document.createElement('img');
      img.className = 'msg-image';
      img.src = src;
      img.onclick = () => openLightbox(src);
      imgWrap.appendChild(img);
    }
    col.appendChild(imgWrap);
  }

  // Bubble
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  const text = typeof msg.content === 'string' ? msg.content : (msg.content?.find?.(c => c.type === 'text')?.text || '');
  if (isUser) {
    bubble.textContent = text;
  } else {
    bubble.innerHTML = renderMd(text);
  }
  col.appendChild(bubble);

  // Actions
  const actions = document.createElement('div');
  actions.className = 'msg-actions';

  const copyBtn = makeActionBtn(`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`, () => {
    navigator.clipboard.writeText(text).then(() => toast('Copied!'));
  });
  actions.appendChild(copyBtn);

  if (isUser) {
    const editBtn = makeActionBtn(`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Edit`, () => startEditMsg(msg.id, text, bubble));
    actions.appendChild(editBtn);
  }

  if (isLastAI) {
    const regenBtn = makeActionBtn(`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Regen`, regenerateLast);
    actions.appendChild(regenBtn);
  }

  const delBtn = makeActionBtn(`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>`, () => deleteMsg(msg.id), true);
  actions.appendChild(delBtn);
  col.appendChild(actions);

  // Meta
  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  if (msg.timestamp) {
    meta.appendChild(Object.assign(document.createElement('span'), { textContent: formatTime(msg.timestamp) }));
  }
  if (msg.stats) {
    const tps = msg.stats.eval_count && msg.stats.eval_duration
      ? (msg.stats.eval_count / (msg.stats.eval_duration / 1e9)).toFixed(1) : null;
    if (tps) {
      const stat = document.createElement('span');
      stat.className = 'stat-badge';
      stat.innerHTML = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> ${tps} tok/s · ${msg.stats.eval_count} tokens`;
      meta.appendChild(stat);
    }
  }
  if (meta.children.length) col.appendChild(meta);

  row.appendChild(col);
  return row;
}

function makeActionBtn(html, fn, danger = false) {
  const b = document.createElement('button');
  b.className = 'msg-action' + (danger ? ' danger' : '');
  b.innerHTML = html;
  b.onclick = fn;
  return b;
}

function startEditMsg(msgId, text, bubble) {
  const conv = currentConv();
  if (!conv || generating) return;
  bubble.innerHTML = '';
  bubble.classList.add('editing-bubble');
  const ta = document.createElement('textarea');
  ta.className = 'edit-textarea';
  ta.value = text;
  ta.rows = text.split('\n').length + 1;
  const acts = document.createElement('div');
  acts.className = 'edit-actions';
  const saveBtn = document.createElement('button');
  saveBtn.className = 'edit-save';
  saveBtn.textContent = 'Save & resend';
  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'edit-cancel';
  cancelBtn.textContent = 'Cancel';
  acts.appendChild(saveBtn);
  acts.appendChild(cancelBtn);
  bubble.appendChild(ta);
  bubble.appendChild(acts);
  ta.focus();
  saveBtn.onclick = () => {
    const newText = ta.value.trim();
    if (!newText) return;
    // Remove this message and all after it
    const idx = conv.messages.findIndex(m => m.id === msgId);
    if (idx !== -1) {
      conv.messages.splice(idx);
      conv.updated = Date.now();
      saveStorage();
      renderMessages();
      sendMessage(newText, []);
    }
  };
  cancelBtn.onclick = () => {
    bubble.classList.remove('editing-bubble');
    bubble.textContent = text;
  };
}

function deleteMsg(msgId) {
  const conv = currentConv();
  if (!conv) return;
  conv.messages = conv.messages.filter(m => m.id !== msgId);
  conv.updated = Date.now();
  saveStorage();
  renderMessages();
  updateRegenBtn();
  updateCtxBar();
}

function appendMsgEl(msg) {
  const conv = currentConv();
  if (!conv) return null;
  const empty = document.getElementById('empty-state');
  if (empty) empty.remove();
  const wrap = document.getElementById('messages');
  const el = buildMsgEl(msg, conv);
  wrap.appendChild(el);
  if (autoScroll) scrollToBottom();
  return el;
}

function sendSuggestion(btn) {
  document.getElementById('prompt').value = btn.textContent;
  submit();
}

// ═══════════════════════════════════════════
// SUBMIT / STREAM
// ═══════════════════════════════════════════
async function submit() {
  const ta = document.getElementById('prompt');
  const text = ta.value.trim();
  if ((!text && !pendingImages.length) || generating) return;

  // Ensure a conversation exists
  if (!currentId) newConversation();
  const conv = currentConv();
  if (!conv) return;

  ta.value = '';
  autoResize();

  const images = pendingImages.map(p => p.dataUrl);
  const imageB64 = pendingImages.map(p => p.base64);
  pendingImages = [];
  renderImagePreviews();

  const userMsg = {
    id: msgId(), role: 'user',
    content: text,
    images: images.length ? images : undefined,
    timestamp: Date.now(),
  };
  conv.messages.push(userMsg);
  conv.updated = Date.now();
  autoTitle(conv);
  saveStorage();
  appendMsgEl(userMsg);

  // AI placeholder
  const aiMsg = { id: msgId(), role: 'assistant', content: '', timestamp: Date.now() };
  conv.messages.push(aiMsg);
  saveStorage();

  // Build placeholder bubble
  const empty = document.getElementById('empty-state');
  if (empty) empty.remove();
  const wrap = document.getElementById('messages');
  const aiRow = document.createElement('div');
  aiRow.className = 'msg-row ai';
  aiRow.dataset.msgId = aiMsg.id;
  const aiAv = document.createElement('div');
  aiAv.className = 'avatar';
  aiAv.textContent = 'G';
  const aiCol = document.createElement('div');
  aiCol.className = 'msg-col';
  const aiBubble = document.createElement('div');
  aiBubble.className = 'bubble';
  aiBubble.innerHTML = '<div class="thinking-dots"><span></span><span></span><span></span></div>';
  aiCol.appendChild(aiBubble);
  aiRow.appendChild(aiAv);
  aiRow.appendChild(aiCol);
  wrap.appendChild(aiRow);
  scrollToBottom();

  setGenerating(true);
  let raw = '';

  // Build messages for API
  const apiMessages = [];
  if (settings.systemPrompt) apiMessages.push({ role: 'system', content: settings.systemPrompt });
  for (const m of conv.messages.slice(0, -1)) {
    const c = typeof m.content === 'string' ? m.content : '';
    const entry = { role: m.role, content: c };
    if (m.images?.length) {
      entry.images = m.images.map(src => src.split(',')[1] || src);
    }
    apiMessages.push(entry);
  }
  // Add current user msg
  const lastUser = { role: 'user', content: text };
  if (imageB64.length) lastUser.images = imageB64;
  apiMessages.push(lastUser);

  abortCtrl = new AbortController();
  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      signal: abortCtrl.signal,
      body: JSON.stringify({
        model: settings.model,
        messages: apiMessages,
        temperature: settings.temperature,
        top_p: settings.topP,
        max_tokens: settings.maxTokens,
        context_length: settings.contextLength,
      }),
    });

    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6);
        try {
          const chunk = JSON.parse(data);
          if (chunk.error) { aiBubble.innerHTML = `<span style="color:var(--red)">${esc(chunk.error)}</span>`; break; }
          if (chunk.t) {
            raw += chunk.t;
            aiBubble.innerHTML = renderMd(raw);
            aiBubble.classList.add('stream-cursor');
            if (autoScroll) scrollToBottom();
          }
          if (chunk.done) {
            aiBubble.classList.remove('stream-cursor');
            aiMsg.content = raw;
            aiMsg.stats = { eval_count: chunk.eval_count, eval_duration: chunk.eval_duration, prompt_eval_count: chunk.prompt_eval_count };
            totalTokensUsed += chunk.eval_count || 0;
            conv.updated = Date.now();
            saveStorage();
            // Rebuild the row with full features (actions, meta, etc.)
            const newRow = buildMsgEl(aiMsg, conv);
            aiRow.replaceWith(newRow);
            if (autoScroll) scrollToBottom();
          }
        } catch {}
      }
    }
  } catch (e) {
    if (e.name !== 'AbortError') {
      aiBubble.classList.remove('stream-cursor');
      aiBubble.innerHTML = `<span style="color:var(--red)">Connection error. Is Ollama running?</span>`;
    } else {
      aiBubble.classList.remove('stream-cursor');
      if (raw) {
        aiMsg.content = raw;
        saveStorage();
        const newRow = buildMsgEl(aiMsg, conv);
        aiRow.replaceWith(newRow);
      } else {
        aiRow.remove();
        conv.messages = conv.messages.filter(m => m.id !== aiMsg.id);
        saveStorage();
      }
    }
  }

  setGenerating(false);
  updateRegenBtn();
  updateCtxBar();
}

async function regenerateLast() {
  const conv = currentConv();
  if (!conv || generating) return;
  const lastAI = conv.messages.filter(m => m.role === 'assistant').pop();
  if (!lastAI) return;
  conv.messages = conv.messages.filter(m => m.id !== lastAI.id);
  conv.updated = Date.now();
  saveStorage();
  renderMessages();
  // Trigger generation without new user input
  setGenerating(false);
  const wrap = document.getElementById('messages');
  const aiMsg = { id: msgId(), role: 'assistant', content: '', timestamp: Date.now() };
  conv.messages.push(aiMsg);
  const aiRow = document.createElement('div');
  aiRow.className = 'msg-row ai';
  aiRow.dataset.msgId = aiMsg.id;
  aiRow.innerHTML = `<div class="avatar">G</div><div class="msg-col"><div class="bubble"><div class="thinking-dots"><span></span><span></span><span></span></div></div></div>`;
  wrap.appendChild(aiRow);
  const aiBubble = aiRow.querySelector('.bubble');
  scrollToBottom();
  setGenerating(true);
  let raw = '';

  const apiMessages = [];
  if (settings.systemPrompt) apiMessages.push({ role: 'system', content: settings.systemPrompt });
  for (const m of conv.messages.slice(0, -1)) {
    const entry = { role: m.role, content: typeof m.content === 'string' ? m.content : '' };
    if (m.images?.length) entry.images = m.images.map(s => s.split(',')[1] || s);
    apiMessages.push(entry);
  }

  abortCtrl = new AbortController();
  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      signal: abortCtrl.signal,
      body: JSON.stringify({ model: settings.model, messages: apiMessages, temperature: settings.temperature, top_p: settings.topP, max_tokens: settings.maxTokens }),
    });
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n'); buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const chunk = JSON.parse(line.slice(6));
          if (chunk.t) { raw += chunk.t; aiBubble.innerHTML = renderMd(raw); aiBubble.classList.add('stream-cursor'); if (autoScroll) scrollToBottom(); }
          if (chunk.done) {
            aiBubble.classList.remove('stream-cursor');
            aiMsg.content = raw; aiMsg.stats = chunk;
            saveStorage();
            aiRow.replaceWith(buildMsgEl(aiMsg, conv));
          }
        } catch {}
      }
    }
  } catch {}
  setGenerating(false);
  updateRegenBtn();
}

function stopGeneration() {
  if (abortCtrl) { abortCtrl.abort(); abortCtrl = null; }
}

// ═══════════════════════════════════════════
// IMAGES
// ═══════════════════════════════════════════
function handleImageFiles(files) {
  for (const f of files) {
    if (!f.type.startsWith('image/')) continue;
    const reader = new FileReader();
    reader.onload = e => {
      const dataUrl = e.target.result;
      const base64 = dataUrl.split(',')[1];
      pendingImages.push({ dataUrl, base64 });
      renderImagePreviews();
    };
    reader.readAsDataURL(f);
  }
  document.getElementById('img-file').value = '';
}

function renderImagePreviews() {
  const wrap = document.getElementById('image-previews');
  wrap.innerHTML = '';
  pendingImages.forEach((img, i) => {
    const item = document.createElement('div');
    item.className = 'preview-item';
    item.innerHTML = `<img class="preview-img" src="${img.dataUrl}"><button class="preview-remove" onclick="removePendingImg(${i})">✕</button>`;
    wrap.appendChild(item);
  });
}

function removePendingImg(i) {
  pendingImages.splice(i, 1);
  renderImagePreviews();
}

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

// ═══════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════
function setGenerating(v) {
  generating = v;
  const send = document.getElementById('send-btn');
  const stop = document.getElementById('stop-btn');
  send.classList.toggle('hidden', v);
  stop.classList.toggle('visible', v);
  document.getElementById('prompt').disabled = v;
}

function updateRegenBtn() {
  const conv = currentConv();
  const hasAI = conv?.messages.some(m => m.role === 'assistant');
  document.getElementById('regen-btn').classList.toggle('visible', !!hasAI && !generating);
}

function updateCtxBar() {
  const conv = currentConv();
  const total = conv?.messages.reduce((acc, m) => {
    const t = typeof m.content === 'string' ? m.content : '';
    return acc + Math.ceil(t.length / 4);
  }, 0) || 0;
  const ctx = settings.contextLength || 4096;
  const pct = Math.min((total / ctx) * 100, 100);
  const fill = document.getElementById('ctx-fill');
  fill.style.width = pct + '%';
  fill.className = 'id'; // reset
  if (pct > 90) fill.classList.add('danger');
  else if (pct > 70) fill.classList.add('warn');
  document.getElementById('ctx-label').textContent = `~${total} / ${ctx}`;
}

function scrollToBottom(instant = false) {
  const wrap = document.getElementById('messages-wrap');
  wrap.scrollTo({ top: wrap.scrollHeight, behavior: instant ? 'auto' : 'smooth' });
}

function autoResize() {
  const ta = document.getElementById('prompt');
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 180) + 'px';
}

function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  if (window.innerWidth <= 640) {
    sidebar.classList.toggle('mobile-open');
    document.getElementById('sidebar-overlay').classList.toggle('visible', sidebar.classList.contains('mobile-open'));
  } else {
    sidebar.classList.toggle('collapsed');
    sidebarOpen = !sidebar.classList.contains('collapsed');
  }
}

function closeSidebarMobile() {
  if (window.innerWidth <= 640) {
    document.getElementById('sidebar').classList.remove('mobile-open');
    document.getElementById('sidebar-overlay').classList.remove('visible');
  }
}

function toggleSysPrompt() {
  const bar = document.getElementById('sysprompt-bar');
  const btn = document.getElementById('sysprompt-toggle');
  bar.classList.toggle('open');
  btn.classList.toggle('active');
}

function clearChat() {
  const conv = currentConv();
  if (!conv || !conv.messages.length) return;
  if (!confirm('Clear this conversation?')) return;
  conv.messages = [];
  conv.title = 'New Chat';
  conv.updated = Date.now();
  saveStorage();
  renderMessages();
  updateRegenBtn();
  updateCtxBar();
}

function exportChat() {
  const conv = currentConv();
  if (!conv || !conv.messages.length) { toast('Nothing to export'); return; }
  let md = `# ${conv.title}\n\n_Exported ${new Date().toLocaleString()}_\n\n---\n\n`;
  for (const m of conv.messages) {
    const text = typeof m.content === 'string' ? m.content : '';
    md += `**${m.role === 'user' ? 'You' : 'Gemma 4'}** · ${formatTime(m.timestamp)}\n\n${text}\n\n---\n\n`;
  }
  const a = document.createElement('a');
  a.href = 'data:text/markdown;charset=utf-8,' + encodeURIComponent(md);
  a.download = (conv.title.replace(/[^a-z0-9]/gi, '_') || 'chat') + '.md';
  a.click();
  toast('Exported!');
}

function toast(msg, duration = 2000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function msgId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

function copyCode(btn) {
  const code = btn.closest('.code-block').querySelector('code');
  navigator.clipboard.writeText(code.textContent).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Copied`;
    setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`; }, 2000);
  });
}

// ═══════════════════════════════════════════
// MODALS
// ═══════════════════════════════════════════
function openModal(id) {
  document.getElementById(id).classList.add('open');
  if (id === 'model-modal') loadModels();
  if (id === 'params-modal') syncParams();
  if (id === 'settings-modal') {
    document.getElementById('settings-sysprompt').value = settings.systemPrompt || '';
  }
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function closeModalOutside(e, id) { if (e.target.id === id) closeModal(id); }

function syncParams() {
  document.getElementById('temp-range').value = settings.temperature;
  document.getElementById('temp-val').textContent = settings.temperature;
  document.getElementById('topp-range').value = settings.topP;
  document.getElementById('topp-val').textContent = settings.topP;
  document.getElementById('maxtok-range').value = settings.maxTokens;
  document.getElementById('maxtok-val').textContent = settings.maxTokens;
  document.getElementById('ctx-range').value = settings.contextLength;
  document.getElementById('ctx-val').textContent = settings.contextLength;
}

function resetParams() {
  settings.temperature = DEFAULT_SETTINGS.temperature;
  settings.topP = DEFAULT_SETTINGS.topP;
  settings.maxTokens = DEFAULT_SETTINGS.maxTokens;
  settings.contextLength = DEFAULT_SETTINGS.contextLength;
  saveStorage();
  syncParams();
  toast('Parameters reset');
}

const MODEL_TAGS = {
  'llama3.1:8b':        { tag: 'General',  desc: 'Solid all-rounder. Good reasoning & instruction following.' },
  'llama3.2:1b':        { tag: 'Fast',     desc: 'Ultra-fast, tiny. Good for simple tasks.' },
  'qwen2.5:7b':         { tag: 'General',  desc: 'Strong multilingual + reasoning. Often beats Llama 3.1 8B.' },
  'qwen2.5-coder:7b':   { tag: 'Coding',   desc: 'Fine-tuned for code. Excellent at debugging & generation.' },
  'qwen3:8b':           { tag: 'Thinking', desc: 'Qwen3 with hybrid thinking mode. Strong reasoning.' },
  'deepseek-r1:8b':     { tag: 'Reasoning',desc: 'DeepSeek R1 distill. Chain-of-thought reasoning model.' },
  'mistral:7b-instruct':{ tag: 'General',  desc: 'Fast & capable. Great for structured tasks.' },
  'mistral-nemo:12b':   { tag: 'General',  desc: 'Mistral 12B — more capable, uses ~7GB VRAM.' },
  'gemma3:4b':          { tag: 'Fast',     desc: 'Google Gemma 3 4B. Efficient & capable for its size.' },
  'phi4-mini:3.8b':     { tag: 'Fast',     desc: 'Microsoft Phi-4 Mini. Punches above its weight class.' },
};

const TAG_COLORS = {
  'General':   '#6c8ebf',
  'Coding':    '#7fb069',
  'Fast':      '#b5a642',
  'Reasoning': '#b06090',
  'Thinking':  '#c07840',
};

async function loadModels() {
  const list = document.getElementById('model-list');
  list.innerHTML = '<div style="color:var(--text-3);font-size:0.82rem">Loading…</div>';
  try {
    const r = await fetch('/models');
    availableModels = await r.json();
    list.innerHTML = '';
    for (const m of availableModels) {
      const div = document.createElement('div');
      div.className = 'model-option' + (m.name === settings.model ? ' selected' : '');
      const sizeMB = m.size ? (m.size / 1e9).toFixed(1) + ' GB' : '';
      const quant = m.details?.quantization_level || '';
      const params = m.details?.parameter_size || '';
      const meta = MODEL_TAGS[m.name] || {};
      const tagColor = meta.tag ? (TAG_COLORS[meta.tag] || 'var(--text-3)') : null;
      const tagHtml = meta.tag ? `<span style="font-size:0.72rem;padding:1px 6px;border-radius:4px;background:${tagColor}22;color:${tagColor};border:1px solid ${tagColor}44;margin-left:6px;vertical-align:middle">${meta.tag}</span>` : '';
      const descHtml = meta.desc ? `<div class="model-details" style="margin-top:2px">${esc(meta.desc)}</div>` : '';
      div.innerHTML = `<div class="model-info"><div class="model-name">${esc(m.name)}${tagHtml}</div>${descHtml}<div class="model-details" style="margin-top:1px">${[params, quant].filter(Boolean).join(' · ')}</div></div><div class="model-size" style="white-space:nowrap">${sizeMB}</div>`;
      div.onclick = () => {
        settings.model = m.name;
        saveStorage();
        document.getElementById('model-label').textContent = m.name;
        document.getElementById('sysprompt-input').placeholder = 'Customize how the AI behaves — tone, role, constraints…';
        document.querySelectorAll('.model-option').forEach(el => el.classList.remove('selected'));
        div.classList.add('selected');
        toast(`Switched to ${m.name}`);
      };
      list.appendChild(div);
    }
    if (!availableModels.length) list.innerHTML = '<div style="color:var(--text-3);font-size:0.82rem">No models found. Pull one with: ollama pull llama3.1:8b</div>';
  } catch {
    list.innerHTML = '<div style="color:var(--red);font-size:0.82rem">Failed to load models</div>';
  }
}

// ═══════════════════════════════════════════
// SCROLL TRACKING
// ═══════════════════════════════════════════
function initScrollTracking() {
  const wrap = document.getElementById('messages-wrap');
  const btn = document.getElementById('scroll-btn');
  wrap.addEventListener('scroll', () => {
    const nearBottom = wrap.scrollHeight - wrap.scrollTop - wrap.clientHeight < 100;
    autoScroll = nearBottom;
    btn.classList.toggle('visible', !nearBottom);
  });
}

// ═══════════════════════════════════════════
// DRAG & DROP IMAGES
// ═══════════════════════════════════════════
function initDragDrop() {
  const area = document.getElementById('input-area');
  area.addEventListener('dragover', e => { e.preventDefault(); area.style.background = 'rgba(124,92,252,.07)'; });
  area.addEventListener('dragleave', () => { area.style.background = ''; });
  area.addEventListener('drop', e => {
    e.preventDefault();
    area.style.background = '';
    const files = [...e.dataTransfer.files].filter(f => f.type.startsWith('image/'));
    if (files.length) handleImageFiles(files);
  });
}

// ═══════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { stopGeneration(); document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open')); closeLightbox(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); newConversation(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'b') { e.preventDefault(); toggleSidebar(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'e') { e.preventDefault(); exportChat(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'r') { e.preventDefault(); regenerateLast(); }
  if (e.key === '/' && document.activeElement !== document.getElementById('prompt') && !e.ctrlKey && !e.metaKey) {
    const active = document.activeElement;
    if (!active || (active.tagName !== 'INPUT' && active.tagName !== 'TEXTAREA' && !active.isContentEditable)) {
      e.preventDefault();
      document.getElementById('prompt').focus();
    }
  }
});

// ═══════════════════════════════════════════
// PROMPT AUTO-RESIZE & PASTE IMAGES
// ═══════════════════════════════════════════
document.getElementById('prompt').addEventListener('input', autoResize);
document.getElementById('prompt').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
});
document.getElementById('prompt').addEventListener('paste', e => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      const file = item.getAsFile();
      if (file) handleImageFiles([file]);
    }
  }
});

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
function init() {
  setupMarked();
  loadStorage();
  initScrollTracking();
  initDragDrop();

  // Apply settings to UI
  document.getElementById('model-label').textContent = settings.model;
  document.getElementById('prompt').placeholder = 'Ask anything…';
  document.getElementById('sysprompt-input').value = settings.systemPrompt || '';
  // Open system prompt bar by default when a prompt is configured
  if (settings.systemPrompt) {
    document.getElementById('sysprompt-bar').classList.add('open');
    document.getElementById('sysprompt-toggle').classList.add('active');
  }

  // Open first conversation or create new
  if (conversations.length) {
    currentId = conversations[0].id;
  } else {
    newConversation();
    return;
  }

  renderSidebar();
  renderMessages();
  updateRegenBtn();
  updateCtxBar();
}

init();
</script>
