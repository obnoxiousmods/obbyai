name: 🐛 Bug Report
description: Something is broken or not working as expected
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out as much detail as possible.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line description of the bug
      placeholder: "e.g. Web search tool crashes when query contains special characters"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Chat (frontend)
        - Chat API (backend)
        - RAG / Knowledge Base
        - Web Search tool
        - File Upload / Processing
        - Image Vision Analysis
        - Model Loading / Ollama
        - Server / GPU Routing
        - Authentication / Nginx
        - Other
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to ...
        2. Upload a ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: Model in use
      placeholder: "e.g. llama3.1:8b on local RX 580"

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste logs from `journalctl -u ai-chat -n 50` or browser console
      render: shell

  - type: input
    id: os
    attributes:
      label: OS / Environment
      placeholder: "e.g. Arch Linux, Python 3.14, uv 0.10"
